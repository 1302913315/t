name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned app
        run: |
          set -euo pipefail
          xcodebuild \
            -project LifeArchiveAI.xcodeproj \
            -scheme LifeArchiveAI \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build/Build/Products/Release-iphoneos -name 'LifeArchiveAI.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "LifeArchiveAI.app not found"
            exit 1
          fi
          rm -rf Payload LifeArchiveAI-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry LifeArchiveAI-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LifeArchiveAI-unsigned-ipa
          path: LifeArchiveAI-unsigned.ipa

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: LifeArchiveAI-app
          path: build/Build/Products/Release-iphoneos/LifeArchiveAI.app
